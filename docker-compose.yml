version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-scheduling-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: smart_scheduling_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: